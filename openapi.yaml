openapi: 3.0.3
info:
  title: Kosongin API
  version: 1.0.0
  description: API untuk aplikasi kosongin - project capstone

tags:
  - name: Auth
  - name: Consumption
  - name: Wishlist
  - name: Challenge
  - name: Admin
  - name: Profile
  - name: Upload

paths:
  # ============================================================
  # AUTH
  # ============================================================
  /auth/register:
    post:
      tags:
        - Auth
      summary: Daftar akun baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Register berhasil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validasi gagal
        '409':
          description: Email atau nickname sudah terdaftar

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login untuk masuk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login berhasil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Kredensial salah

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout dari aplikasi
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout berhasil
        '401':
          description: Unauthorized

  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Request link reset password ke email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Email reset password dikirim

  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Reset password menggunakan token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password berhasil direset

  # ============================================================
  # PROFILE
  # ============================================================
  /profile:
    get:
      tags:
        - Profile
      summary: Ambil data profil pengguna
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil profil
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/User'

  /profile/reminder-settings:
    patch:
      tags:
        - Profile
      summary: Update pengaturan pengingat (reminder)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                opt_in:
                  type: boolean
                  example: true
                reminder_time:
                  type: string
                  example: "19:00"
      responses:
        '200':
          description: Settings berhasil diupdate

  # ============================================================
  # CONSUMPTION LOGS
  # ============================================================
  /consumption-logs:
    get:
      tags:
        - Consumption
      summary: Ambil semua riwayat konsumsi
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [consumedAt, amount, createdAt]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
      responses:
        '200':
          description: Berhasil mengambil data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConsumptionLog'

    post:
      tags:
        - Consumption
      summary: Tambah item konsumsi baru
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddConsumptionRequest'
      responses:
        '201':
          description: Berhasil ditambahkan

  /consumption-logs/{id}:
    put:
      tags:
        - Consumption
      summary: Update item konsumsi
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddConsumptionRequest'
      responses:
        '200':
          description: Berhasil diupdate

    delete:
      tags:
        - Consumption
      summary: Hapus item konsumsi
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Berhasil dihapus

  # ============================================================
  # DASHBOARD INSIGHT
  # ============================================================
  /dashboard/insight:
    get:
      tags:
        - Consumption
      summary: Ambil ringkasan insight konsumsi
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ConsumptionInsights'

  # ============================================================
  # WISHLIST
  # ============================================================
  /wishlist:
    get:
      tags:
        - Wishlist
      summary: Ambil semua item wishlist
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WishlistItem'

    post:
      tags:
        - Wishlist
      summary: Tambah item ke wishlist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWishlistRequest'
      responses:
        '201':
          description: Berhasil ditambahkan

  /wishlist/{id}:
    patch:
      tags:
        - Wishlist
      summary: Update status wishlist (beli/batalkan)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWishlistStatusRequest'
      responses:
        '200':
          description: Berhasil diupdate

  # ============================================================
  # CHALLENGE
  # ============================================================
  /challenge:
    get:
      tags:
        - Challenge
      summary: Ambil semua challenge aktif
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil

  /challenge/me:
    get:
      tags:
        - Challenge
      summary: Ambil challenge yang diikuti
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil

  /challenge/{id}:
    get:
      tags:
        - Challenge
      summary: Ambil detail challenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Berhasil

  /challenge/{id}/join:
    post:
      tags:
        - Challenge
      summary: Ikut challenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Berhasil join

  # ============================================================
  # UPLOAD
  # ============================================================
  /upload/signature:
    post:
      tags:
        - Upload
      summary: Dapatkan signature untuk upload Cloudinary
      # security:
      #   - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                folderType:
                  type: string
                  enum: [consumption, challenge]
      responses:
        '200':
          description: Signature berhasil didapatkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      signature:
                        type: string
                      timestamp:
                        type: integer
                      apiKey:
                        type: string
                      cloudName:
                        type: string
                      folder:
                        type: string

  # ============================================================
  # ADMIN
  # ============================================================
  /admin/stats:
    get:
      tags:
        - Admin
      summary: Statistik overview admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil

  /admin/users:
    get:
      tags:
        - Admin
      summary: Daftar pengguna (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil

  /admin/users/export:
    get:
      tags:
        - Admin
      summary: Export data pengguna ke CSV
      security:
        - bearerAuth: []
      responses:
        '200':
          description: File CSV berhasil didownload
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /admin/monitoring:
    get:
      tags:
        - Admin
      summary: Monitoring aktivitas pengguna
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil

  /admin/challenges:
    get:
      tags:
        - Admin
      summary: Semua challenge (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil
    post:
      tags:
        - Admin
      summary: Buat challenge baru
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Berhasil

  /admin/challenges/{id}:
    put:
      tags:
        - Admin
      summary: Update challenge
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil
    delete:
      tags:
        - Admin
      summary: Hapus challenge
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil

################################################################################
components:
  schemas:
    CustomTimeStamp:
      type: string
      pattern: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$'
      example: '2024-05-20 14:30:00'

    User:
      type: object
      properties:
        fullName:
          type: string
          example: 'Ikmal'
        nickName:
          type: string
          example: 'ikmal123'
        email:
          type: string
          example: 'ikmal@email.com'
        reminderEnabled:
          type: boolean
          example: true
        reminderTime:
          type: string
          example: "19:00"

    RegisterRequest:
      type: object
      required: [nickname, fullname, email, password, password_confirm]
      properties:
        nickname:
          type: string
          example: 'ikmal'
        fullname:
          type: string
          example: 'Ikmal'
        email:
          type: string
          example: 'ikmal@email.com'
        password:
          type: string
          example: 'password123'
        password_confirm:
          type: string
          example: 'password123'

    LoginRequest:
      type: object
      required: [password]
      properties:
        nickname:
          type: string
          example: 'ikmal'
        email:
          type: string
          example: 'ikmal@email.com'
        password:
          type: string
          example: 'password123'

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            token:
              type: string
            user:
              $ref: '#/components/schemas/User'

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          example: 'ikmal@email.com'

    ResetPasswordRequest:
      type: object
      required: [token, new_password, new_password_confirm]
      properties:
        token:
          type: string
        new_password:
          type: string
        new_password_confirm:
          type: string

    ConsumptionLog:
      type: object
      properties:
        id:
          type: string
        itemName:
          type: string
          example: 'Nasi Goreng'
        itemCategory:
          type: string
          enum: [makanan & minuman, fashion, elektronik, perawatan diri, hiburan, lainnya]
        itemCategoryCustom:
          type: string
          nullable: true
        amount:
          type: number
        consumedAt:
          type: string

    AddConsumptionRequest:
      type: object
      required: [itemName, itemCategory, amount]
      properties:
        itemName:
          type: string
          example: 'Nasi Goreng'
        itemCategory:
          type: string
          enum: [makanan & minuman, fashion, elektronik, perawatan diri, hiburan, lainnya]
        itemCategoryCustom:
          type: string
        amount:
          type: number
        notes:
          type: string
        consumedAt:
          type: string

    ConsumptionInsights:
      type: object
      properties:
        totalThisWeek:
          type: number
        topCategory:
          type: string
        dailyData:
          type: array
          items:
            type: object

    WishlistItem:
      type: object
      properties:
        id:
          type: string
        itemName:
          type: string
          example: 'Sepatu Nike'
        itemCategory:
          type: string
          enum: [makanan & minuman, fashion, elektronik, perawatan diri, hiburan, lainnya]
        itemCategoryCustom:
          type: string
          nullable: true
        estimatePrice:
          type: number
        waitingDays:
          type: integer
        whislistStatus:
          type: string
        wishlistDaysRemaining:
          type: integer

    AddWishlistRequest:
      type: object
      required: [itemName, itemCategory, estimatePrice, waitingDays]
      properties:
        itemName:
          type: string
          example: 'Sepatu Nike'
        itemCategory:
          type: string
          enum: [makanan & minuman, fashion, elektronik, perawatan diri, hiburan, lainnya]
        itemCategoryCustom:
          type: string
        estimatePrice:
          type: number
        waitingDays:
          type: integer
          enum: [3, 7, 14, 30]
        reason:
          type: string

    UpdateWishlistStatusRequest:
      type: object
      required: [whislistStatus]
      properties:
        whislistStatus:
          type: string
          enum: [waiting, bought, cancelled]

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
