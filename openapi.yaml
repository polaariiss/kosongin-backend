openapi: 3.0.3
info:
  title: Kosongin API
  version: 1.0.0
  description: API untuk aplikasi kosongin - project capstone

tags:
  - name: Auth
  - name: Consumption
  - name: Impulse Shield
  - name: Challenge
  - name: Admin
  - name: Profile
  - name: Upload

paths:
  # ============================================================
  # AUTH
  # ============================================================
  /auth/register:
    post:
      tags:
        - Auth
      summary: Daftar akun baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Register berhasil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validasi gagal (misal password tidak cocok)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Email atau nickname sudah terdaftar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login untuk masuk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login berhasil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Email/nickname atau password salah
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Request link reset password ke email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Email reset password berhasil dikirim
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '404':
          description: Email tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Reset password menggunakan token dari email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password berhasil direset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Token tidak valid atau sudah kadaluarsa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # UPLOAD
  # ============================================================
  /upload/signature:
    post:
      tags:
        - Upload
      summary: Generate signature untuk upload gambar ke Cloudinary
      description: 'Frontend gunakan signature ini untuk upload langsung ke Cloudinary API, lalu kirim imageUrl hasilnya ke endpoint lain seperti /consumption-logs.'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadSignatureRequest'
      responses:
        '200':
          description: Signature berhasil digenerate
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UploadSignatureResponse'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # PROFILE
  # ============================================================
  /profile:
    get:
      tags:
        - Profile
      summary: Ambil data profil pengguna yang sedang login
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil profil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Profile
      summary: Update data profil pengguna
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profil berhasil diupdate
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Nickname sudah dipakai pengguna lain
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # CONSUMPTION
  # ============================================================
  /consumption-logs:
    get:
      tags:
        - Consumption
      summary: Ambil semua riwayat konsumsi milik pengguna
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          required: false
          description: Filter berdasarkan kategori
          schema:
            type: string
            enum:
              - makanan & minuman
              - fashion
              - elektronik
              - perawatan diri
              - hiburan
        - name: startDate
          in: query
          required: false
          description: Filter dari tanggal (YYYY-MM-DD)
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          required: false
          description: Filter sampai tanggal (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Berhasil mengambil data konsumsi
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConsumptionLog'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Consumption
      summary: Tambah item konsumsi baru
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddConsumptionRequest'
      responses:
        '201':
          description: Item konsumsi berhasil ditambahkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ConsumptionLog'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /consumption-logs/{id}:
    put:
      tags:
        - Consumption
      summary: Update item konsumsi
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID item konsumsi
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddConsumptionRequest'
      responses:
        '200':
          description: Item konsumsi berhasil diupdate
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ConsumptionLog'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - bukan milik pengguna ini
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Consumption
      summary: Hapus item konsumsi
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID item konsumsi
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Item berhasil dihapus (no content)
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - bukan milik pengguna ini
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /consumption-logs/insights:
    get:
      tags:
        - Consumption
      summary: Ambil ringkasan konsumsi (total minggu ini, kategori terbanyak, data harian)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil insights konsumsi
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ConsumptionInsights'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # IMPULSE SHIELD
  # ============================================================
  /impulse-shield:
    get:
      tags:
        - Impulse Shield
      summary: Ambil semua item wishlist milik pengguna
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filter berdasarkan status item
          schema:
            type: string
            enum: [waiting, bought, cancelled]
      responses:
        '200':
          description: Berhasil mengambil daftar wishlist
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WishlistItem'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Impulse Shield
      summary: Tambah item ke wishlist (impulse shield)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddItemImpulseShieldRequest'
      responses:
        '201':
          description: Item berhasil ditambahkan ke wishlist
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/WishlistItem'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /impulse-shield/stats:
    get:
      tags:
        - Impulse Shield
      summary: Ambil statistik impulse shield (item dibatalkan, uang dihemat, total item)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil statistik
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ImpulseShieldStats'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /impulse-shield/{id}/decide:
    patch:
      tags:
        - Impulse Shield
      summary: Putuskan status item wishlist (beli atau batalkan)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID item wishlist
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DecideImpulseRequest'
      responses:
        '200':
          description: Status item berhasil diupdate
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/WishlistItem'
        '400':
          description: Status tidak valid atau item sudah diputuskan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - bukan milik pengguna ini
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Item tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # CHALLENGE
  # ============================================================
  /challenge:
    get:
      tags:
        - Challenge
      summary: Ambil semua challenge yang tersedia
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filter berdasarkan status challenge
          schema:
            type: string
            enum: [active, inactive]
        - name: category
          in: query
          required: false
          description: Filter berdasarkan kategori
          schema:
            type: string
      responses:
        '200':
          description: Berhasil mengambil daftar challenge
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChallengeItem'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /challenge/me:
    get:
      tags:
        - Challenge
      summary: Ambil daftar challenge yang diikuti pengguna beserta progressnya
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil challenge yang diikuti
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserChallengeItem'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /challenge/{id}:
    get:
      tags:
        - Challenge
      summary: Ambil detail satu challenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID challenge
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Berhasil mengambil detail challenge
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ChallengeDetail'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Challenge tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /challenge/{id}/join:
    post:
      tags:
        - Challenge
      summary: Ikut (join) sebuah challenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID challenge yang ingin diikuti
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Berhasil join challenge
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/UserChallengeItem'
        '400':
          description: Pengguna sudah join challenge ini
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Challenge tidak ditemukan atau sudah tidak aktif
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # ADMIN
  # ============================================================
  /admin/auth/login:
    post:
      tags:
        - Admin
        - Auth
      summary: Login untuk admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Login admin berhasil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Kredensial salah
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/stats:
    get:
      tags:
        - Admin
      summary: Ambil statistik keseluruhan aplikasi
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil statistik admin
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/AdminStats'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - bukan admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users:
    get:
      tags:
        - Admin
      summary: Ambil daftar pengguna (dengan pencarian dan filter)
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          required: false
          description: Cari berdasarkan nama atau email
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filter berdasarkan status akun
          schema:
            type: string
            enum: [active, inactive]
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Berhasil mengambil daftar pengguna
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AdminUserItem'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - bukan admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/challenges:
    get:
      tags:
        - Admin
        - Challenge
      summary: Ambil semua challenge (termasuk yang inactive)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil daftar challenge
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChallengeDetail'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - bukan admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Admin
        - Challenge
      summary: Admin membuat challenge komunitas baru
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminAddChallengeRequest'
      responses:
        '201':
          description: Challenge berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ChallengeDetail'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - bukan admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/challenges/{id}:
    put:
      tags:
        - Admin
        - Challenge
      summary: Admin edit atau menonaktifkan challenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: UUID challenge
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUpdateChallengeRequest'
      responses:
        '200':
          description: Challenge berhasil diupdate
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ChallengeDetail'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - bukan admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Challenge tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/email-logs:
    get:
      tags:
        - Admin
      summary: Ambil log aktivitas email dan statistik harian
      security:
        - bearerAuth: []
      parameters:
        - name: date
          in: query
          required: false
          description: Filter log berdasarkan tanggal (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Berhasil mengambil log email
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/AdminEmailLogStats'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - bukan admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

################################################################################
components:
  schemas:
    # ----------------------------------------------------------
    # SHARED / BASE
    # ----------------------------------------------------------
    CustomTimeStamp:
      type: string
      pattern: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$'
      example: '2024-05-20 14:30:00'
      description: Timestamp dalam format YYYY-MM-DD HH:MM:SS

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: 'Pesan error yang menjelaskan masalah'

    MessageResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: 'Operasi berhasil'

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 100

    # ----------------------------------------------------------
    # USER
    # ----------------------------------------------------------
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nickname:
          type: string
          example: 'budi123'
        fullname:
          type: string
          minLength: 3
          example: 'Budi Santoso'
        email:
          type: string
          format: email
          example: 'budi@email.com'
      required: [id, nickname, fullname, email]

    RegisterRequest:
      type: object
      required: [nickname, fullname, email, password, password_confirm]
      properties:
        nickname:
          type: string
          pattern: '^[a-zA-Z0-9_]+$'
          minLength: 3
          example: 'budi123'
        fullname:
          type: string
          minLength: 3
          example: 'Budi Santoso'
        email:
          type: string
          format: email
          example: 'budi@email.com'
        password:
          type: string
          minLength: 8
          example: 'password123'
        password_confirm:
          type: string
          minLength: 8
          example: 'password123'

    LoginRequest:
      type: object
      description: Login bisa menggunakan nickname atau email, salah satu wajib ada
      properties:
        nickname:
          type: string
          example: 'budi123'
        email:
          type: string
          format: email
          example: 'budi@email.com'
        password:
          type: string
          minLength: 8
          example: 'password123'
      required: [password]
      oneOf:
        - required: [nickname]
          title: Login dengan nickname
        - required: [email]
          title: Login dengan email

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            token:
              type: string
              example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'
            user:
              $ref: '#/components/schemas/User'

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: 'budi@email.com'

    ResetPasswordRequest:
      type: object
      required: [token, new_password, new_password_confirm]
      properties:
        token:
          type: string
          description: Token yang dikirim ke email pengguna
          example: 'abc123resettoken'
        new_password:
          type: string
          minLength: 8
          example: 'newpassword123'
        new_password_confirm:
          type: string
          minLength: 8
          example: 'newpassword123'

    UpdateProfileRequest:
      type: object
      properties:
        nickname:
          type: string
          pattern: '^[a-zA-Z0-9_]+$'
          minLength: 3
          example: 'budi_baru'
        fullname:
          type: string
          minLength: 3
          example: 'Budi Santoso Baru'

    # ----------------------------------------------------------
    # CONSUMPTION
    # ----------------------------------------------------------
    ConsumptionLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        itemName:
          type: string
          example: 'Nasi Goreng'
        itemCategory:
          type: string
          enum:
            - makanan & minuman
            - fashion
            - elektronik
            - perawatan diri
            - hiburan
            - lainnya
          example: 'makanan & minuman'
        itemCategoryCustom:
          type: string
          example: 'Jasa'
        amount:
          type: number
          format: decimal
          example: 25000
        notes:
          type: string
          example: 'Beli di warung dekat kantor'
        createdAt:
          $ref: '#/components/schemas/CustomTimeStamp'

    AddConsumptionRequest:
      type: object
      required: [itemName, itemCategory, amount]
      properties:
        userId:
          type: string
          format: uuid
        itemName:
          type: string
          example: 'Nasi Goreng'
        itemCategory:
          type: string
          enum:
            - makanan & minuman
            - fashion
            - elektronik
            - perawatan diri
            - hiburan
            - lainnya
          example: 'makanan & minuman'
        itemCategoryCustom:
          type: string
          description: 'kalau itemCategorynya lainnya, field ini harus diisi'
        amount:
          type: number
          format: decimal
          example: 25000
        notes:
          type: string
          example: 'Beli di warung dekat kantor'
        imageUrl:
          type: string
          format: uri
          description: 'URL gambar dari Cloudinary (opsional, didapat setelah upload signed)'
          example: 'https://res.cloudinary.com/your-cloud/image/upload/v123456789/consumption/nasi-padang.jpg'

    ConsumptionInsights:
      type: object
      properties:
        totalThisWeek:
          type: integer
          description: Total item konsumsi yang tercatat minggu ini
          example: 12
        topCategory:
          type: string
          description: Kategori dengan konsumsi terbanyak minggu ini
          example: 'makanan & minuman'
        dailyData:
          type: array
          description: Data konsumsi harian dalam 7 hari terakhir
          items:
            type: object
            properties:
              date:
                type: string
                format: date
                example: '2024-05-20'
              count:
                type: integer
                example: 3
              totalAmount:
                type: number
                example: 75000

    # ----------------------------------------------------------
    # IMPULSE SHIELD / WISHLIST
    # ----------------------------------------------------------
    WishlistItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        itemName:
          type: string
          example: 'Sepatu Nike'
        itemCategory:
          type: string
          enum:
            - makanan & minuman
            - fashion
            - elektronik
            - perawatan diri
            - hiburan
          example: 'fashion'
        estimatedPrice:
          type: number
          format: decimal
          example: 1200000
        status:
          type: string
          enum: [waiting, bought, cancelled]
          example: 'waiting'
        reason:
          type: string
          example: 'Untuk olahraga'
        duration:
          type: integer
          description: Durasi tunggu dalam hari sebelum memutuskan
          example: 7
        createdAt:
          $ref: '#/components/schemas/CustomTimeStamp'

    AddItemImpulseShieldRequest:
      type: object
      required: [itemName, category, duration]
      properties:
        itemName:
          type: string
          example: 'Sepatu Nike'
        category:
          type: string
          enum:
            - makanan & minuman
            - fashion
            - elektronik
            - perawatan diri
            - hiburan
          example: 'fashion'
        estimatedPrice:
          type: number
          format: decimal
          example: 1200000
        duration:
          type: integer
          description: Durasi tunggu dalam hari (3, 7, 14, atau 30)
          enum: [3, 7, 14, 30]
          example: 7
        reason:
          type: string
          example: 'Untuk olahraga'

    DecideImpulseRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [bought, cancelled]
          description: Keputusan akhir untuk item ini
          example: 'cancelled'

    ImpulseShieldStats:
      type: object
      properties:
        totalItems:
          type: integer
          description: Total seluruh item yang pernah ditambahkan
          example: 20
        totalCancelled:
          type: integer
          description: Total item yang berhasil dibatalkan
          example: 14
        estimatedSaved:
          type: number
          description: Estimasi total uang yang berhasil dihemat (dari item cancelled)
          example: 3500000

    # ----------------------------------------------------------
    # CHALLENGE
    # ----------------------------------------------------------
    ChallengeItem:
      type: object
      description: Data ringkas challenge untuk tampilan list
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          example: '30 Hari Tanpa Jajan'
        description:
          type: string
          example: 'Tantangan untuk menahan diri tidak jajan selama 30 hari'
        categoryTag:
          type: string
          example: 'makanan & minuman'
        imageUrl:
          type: string
          example: 'https://storage.example.com/challenges/abc.jpg'
        startDate:
          $ref: '#/components/schemas/CustomTimeStamp'
        endDate:
          $ref: '#/components/schemas/CustomTimeStamp'
        status:
          type: string
          enum: [active, inactive]
          example: 'active'
        participantCount:
          type: integer
          description: Jumlah peserta yang sudah join
          example: 152

    ChallengeDetail:
      allOf:
        - $ref: '#/components/schemas/ChallengeItem'
        - type: object
          properties:
            fullDescription:
              type: string
              example: 'Deskripsi lengkap tentang challenge ini...'
            rules:
              type: string
              example: '1. Tidak boleh membeli makanan di luar. 2. ...'
            howTo:
              type: string
              example: 'Catat setiap hari apakah kamu berhasil tidak jajan'
            durationDays:
              type: integer
              example: 30

    UserChallengeItem:
      type: object
      description: Challenge yang sedang atau sudah diikuti pengguna
      properties:
        challengeId:
          type: string
          format: uuid
        title:
          type: string
          example: '30 Hari Tanpa Jajan'
        progress:
          type: integer
          description: Progress dalam persen (0-100)
          example: 40
        joinedAt:
          $ref: '#/components/schemas/CustomTimeStamp'

    # ----------------------------------------------------------
    # ADMIN REQUESTS
    # ----------------------------------------------------------
    AdminLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: 'admin@kosongin.com'
        password:
          type: string
          minLength: 8
          example: 'adminpassword123'

    AdminAddChallengeRequest:
      type: object
      required:
        [
          title,
          description,
          fullDescription,
          rules,
          howTo,
          category,
          startDate,
          endDate,
        ]
      properties:
        title:
          type: string
          minLength: 1
          example: '30 Hari Tanpa Jajan'
        description:
          type: string
          minLength: 1
          example: 'Tantangan untuk menahan diri tidak jajan selama 30 hari'
        fullDescription:
          type: string
          minLength: 1
          example: 'Deskripsi panjang tentang challenge ini...'
        rules:
          type: string
          minLength: 1
          example: '1. Tidak boleh membeli jajanan. 2. ...'
        howTo:
          type: string
          minLength: 1
          example: 'Catat setiap hari di aplikasi'
        category:
          type: string
          minLength: 1
          example: 'makanan & minuman'
        imageUrl:
          type: string
          example: 'https://storage.example.com/challenges/abc.jpg'
        durationDays:
          type: integer
          example: 30
        startDate:
          $ref: '#/components/schemas/CustomTimeStamp'
        endDate:
          $ref: '#/components/schemas/CustomTimeStamp'

    AdminUpdateChallengeRequest:
      type: object
      description: Semua field opsional, hanya field yang dikirim yang akan diupdate
      properties:
        title:
          type: string
          minLength: 1
        description:
          type: string
          minLength: 1
        fullDescription:
          type: string
          minLength: 1
        rules:
          type: string
          minLength: 1
        howTo:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
        imageUrl:
          type: string
        durationDays:
          type: integer
        startDate:
          $ref: '#/components/schemas/CustomTimeStamp'
        endDate:
          $ref: '#/components/schemas/CustomTimeStamp'
        status:
          type: string
          enum: [active, inactive]
          description: Gunakan inactive untuk menonaktifkan challenge

    # ----------------------------------------------------------
    # ADMIN RESPONSES
    # ----------------------------------------------------------
    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
          description: Total pengguna terdaftar
          example: 1500
        totalConsumptionLogs:
          type: integer
          description: Total item konsumsi yang pernah dicatat
          example: 8400
        totalImpulseCancelled:
          type: integer
          description: Total item impulse shield yang dibatalkan
          example: 320
        totalActiveChallenges:
          type: integer
          description: Total challenge yang sedang aktif
          example: 5

    AdminUserItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nickname:
          type: string
          example: 'budi123'
        fullname:
          type: string
          example: 'Budi Santoso'
        email:
          type: string
          format: email
          example: 'budi@email.com'
        status:
          type: string
          enum: [active, inactive]
          example: 'active'
        createdAt:
          $ref: '#/components/schemas/CustomTimeStamp'

    AdminEmailLogStats:
      type: object
      properties:
        dailyUserActivity:
          type: array
          description: Log aktivitas pengguna per hari
          items:
            type: object
            properties:
              date:
                type: string
                format: date
                example: '2024-05-20'
              activeUsers:
                type: integer
                example: 120
        dailyConsumptionCount:
          type: array
          description: Jumlah item konsumsi yang tercatat per hari
          items:
            type: object
            properties:
              date:
                type: string
                format: date
                example: '2024-05-20'
              count:
                type: integer
                example: 340
        topChallenges:
          type: array
          description: Top 3 challenge dengan peserta terbanyak
          maxItems: 3
          items:
            type: object
            properties:
              challengeId:
                type: string
                format: uuid
              title:
                type: string
                example: '30 Hari Tanpa Jajan'
              participantCount:
                type: integer
                example: 200
    UploadSignatureRequest:
      type: object
      required: [fileName, fileType]
      properties:
        fileName:
          type: string
          example: 'nasi-padang.jpg'
        fileType:
          type: string
          enum: [image/jpeg, image/png, image/jpg]
          example: 'image/jpeg'

    UploadSignatureResponse:
      type: object
      properties:
        signature:
          type: string
          description: Signature kriptografis yang digenerate dari Cloudinary secret
          example: 'abc123def456...'
        timestamp:
          type: integer
          description: Unix timestamp saat signature dibuat
          example: 1716000000
        apiKey:
          type: string
          description: Cloudinary API key (public)
          example: '123456789012345'
        cloudName:
          type: string
          description: Nama cloud Cloudinary kamu
          example: 'your-cloud-name'
        folder:
          type: string
          description: Folder tujuan di Cloudinary
          example: 'consumption'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
