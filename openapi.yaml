openapi: 3.0.3
info:
  title: Kosongin API
  version: 1.0.0
  description: API untuk aplikasi kosongin - project capstone

tags:
  - name: Auth
  - name: Consumption
  - name: Wishlist
  - name: Challenge
  - name: Admin
  - name: Profile
  - name: Upload

paths:
  # ============================================================
  # AUTH
  # ============================================================
  /auth/register:
    post:
      tags:
        - Auth
      summary: Daftar akun baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Register berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'User berhasil dibuat'
                  data:
                    type: object
                    properties:
                      id:
                        type: string
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '409':
          description: Email atau nickname sudah terdaftar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login untuk masuk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Login berhasil'
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
        '401':
          description: Kredensial salah
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token menggunakan refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refresh berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'token refreshed'
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
        '401':
          description: Refresh token tidak valid atau kadaluarsa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout dari aplikasi
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'logout berhasil'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Request link reset password ke email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Email reset password dikirim
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 'Jika email terdaftar, link reset akan dikirim.'

  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Reset password menggunakan token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password berhasil direset
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'password berhasil direset'

  # ============================================================
  # PROFILE
  # ============================================================
  /profile:
    get:
      tags:
        - Profile
      summary: Ambil data profil pengguna
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil profil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil profil'
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile/reminder-settings:
    patch:
      tags:
        - Profile
      summary: Update pengaturan pengingat (reminder)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                opt_in:
                  type: boolean
                  example: true
                reminder_time:
                  type: string
                  example: "19:00"
      responses:
        '200':
          description: Settings berhasil diupdate
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Reminder settings berhasil diupdate'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # CONSUMPTION LOGS
  # ============================================================
  /consumption-logs:
    get:
      tags:
        - Consumption
      summary: Ambil semua riwayat konsumsi
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [consumedAt, amount, createdAt]
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Berhasil mengambil data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil log konsumsi'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConsumptionLog'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Consumption
      summary: Tambah item konsumsi baru
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddConsumptionRequest'
      responses:
        '201':
          description: Berhasil ditambahkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Log konsumsi berhasil dicatat'
                  data:
                    $ref: '#/components/schemas/ConsumptionLog'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /consumption-logs/{id}:
    put:
      tags:
        - Consumption
      summary: Update item konsumsi
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddConsumptionRequest'
      responses:
        '200':
          description: Berhasil diupdate
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Log konsumsi berhasil diperbarui'
                  data:
                    $ref: '#/components/schemas/ConsumptionLog'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Data tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Consumption
      summary: Hapus item konsumsi
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Log konsumsi berhasil dihapus'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Data tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # DASHBOARD INSIGHT
  # ============================================================
  /dashboard/insight:
    get:
      tags:
        - Consumption
      summary: Ambil ringkasan insight konsumsi
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'data berhasil diambil'
                  data:
                    $ref: '#/components/schemas/ConsumptionInsights'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # WISHLIST
  # ============================================================
  /wishlist:
    get:
      tags:
        - Wishlist
      summary: Ambil semua item wishlist
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil data
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'success'
                  message:
                    type: string
                    example: 'wishlist get!'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WishlistItem'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Wishlist
      summary: Tambah item ke wishlist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWishlistRequest'
      responses:
        '201':
          description: Berhasil ditambahkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'success'
                  message:
                    type: string
                    example: 'wishlist created!'
                  data:
                    $ref: '#/components/schemas/WishlistItem'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /wishlist/{id}:
    patch:
      tags:
        - Wishlist
      summary: Update status wishlist (beli/batalkan)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWishlistStatusRequest'
      responses:
        '200':
          description: Berhasil diupdate
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'success'
                  message:
                    type: string
                    example: 'wishlist updated'
                  data:
                    $ref: '#/components/schemas/WishlistItem'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Data tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # CHALLENGE
  # ============================================================
  /challenge:
    get:
      tags:
        - Challenge
      summary: Ambil semua challenge aktif
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil daftar challenge aktif
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil daftar challenge aktif'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Challenge'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /challenge/me:
    get:
      tags:
        - Challenge
      summary: Ambil challenge yang diikuti
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil daftar challenge yang diikuti
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil daftar challenge yang diikuti'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserChallenge'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /challenge/{id}:
    get:
      tags:
        - Challenge
      summary: Ambil detail challenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Berhasil mengambil detail challenge
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil detail challenge'
                  data:
                    $ref: '#/components/schemas/Challenge'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Challenge tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /challenge/{id}/join:
    post:
      tags:
        - Challenge
      summary: Ikut challenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Berhasil bergabung dalam challenge
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil bergabung dalam challenge'
                  data:
                    $ref: '#/components/schemas/UserChallenge'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Challenge tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # UPLOAD
  # ============================================================
  /upload/signature:
    post:
      tags:
        - Upload
      summary: Dapatkan signature untuk upload Cloudinary
      # security:
      #   - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                folderType:
                  type: string
                  enum: [consumption, challenge]
      responses:
        '200':
          description: Signature berhasil didapatkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      signature:
                        type: string
                      timestamp:
                        type: integer
                      apiKey:
                        type: string
                      cloudName:
                        type: string
                      folder:
                        type: string

  # ============================================================
  # ADMIN
  # ============================================================
  /admin/stats:
    get:
      tags:
        - Admin
      summary: Statistik overview admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil data overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil data overview'
                  data:
                    $ref: '#/components/schemas/AdminOverview'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users:
    get:
      tags:
        - Admin
      summary: Daftar pengguna (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Berhasil mengambil daftar pengguna
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil daftar pengguna'
                  data:
                    $ref: '#/components/schemas/AdminUserList'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/export:
    get:
      tags:
        - Admin
      summary: Export data pengguna ke CSV
      security:
        - bearerAuth: []
      responses:
        '200':
          description: File CSV berhasil didownload
          content:
            text/csv:
              schema:
                type: string
                format: binary
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/monitoring:
    get:
      tags:
        - Admin
      summary: Monitoring aktivitas pengguna
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Data monitoring berhasil diambil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Data monitoring berhasil diambil'
                  data:
                    $ref: '#/components/schemas/AdminMonitoring'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/challenges:
    get:
      tags:
        - Admin
      summary: Semua challenge (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil semua daftar challenge
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil semua daftar challenge'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Challenge'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Admin
      summary: Buat challenge baru
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Berhasil membuat challenge baru
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil membuat challenge baru'
                  data:
                    $ref: '#/components/schemas/Challenge'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/challenges/{id}:
    put:
      tags:
        - Admin
      summary: Update challenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Berhasil memperbarui data challenge
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil memperbarui data challenge'
                  data:
                    $ref: '#/components/schemas/Challenge'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Data tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Admin
      summary: Hapus challenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Berhasil menghapus challenge
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil menghapus challenge'
                  data:
                    $ref: '#/components/schemas/Challenge'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Data tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

################################################################################
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    CustomTimeStamp:
      type: string
      pattern: '^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$'
      example: '2024-05-20 14:30:00'

    User:
