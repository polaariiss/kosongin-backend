openapi: 3.0.3
info:
  title: Kosongin API
  version: 1.0.0
  description: API untuk aplikasi kosongin - project capstone

tags:
  - name: Auth
    description: Otentikasi dan Manajemen Akun
  - name: Consumption
    description: Pencatatan Konsumsi Harian
  - name: Wishlist
    description: Manajemen Wishlist (Impulse Shield)
  - name: Challenge
    description: Tantangan Gaya Hidup Berkelanjutan
  - name: Admin
    description: Operasi khusus Administrator
  - name: Profile
    description: Profil Pengguna dan Pengaturan
  - name: Upload
    description: Manajemen File dan Upload
  - name: Helper
    description: Endpoint bantuan (Internal/Development)

paths:
  # ============================================================
  # AUTH
  # ============================================================
  /auth/register:
    post:
      tags:
        - Auth
      summary: Daftar akun baru
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Register berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'User berhasil dibuat'
                  data:
                    type: object
                    properties:
                      id:
                        type: string
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '409':
          description: Email atau nickname sudah terdaftar
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login untuk masuk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Login berhasil'
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
        '401':
          description: Kredensial salah
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags:
        - Auth
      summary: Refresh access token menggunakan refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refresh berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'token refreshed'
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
        '401':
          description: Refresh token tidak valid atau kadaluarsa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logout dari aplikasi
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout berhasil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'logout berhasil'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Request link reset password ke email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Email reset password dikirim
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Jika email terdaftar, link reset akan dikirim.'

  /auth/reset-password:
    post:
      tags:
        - Auth
      summary: Reset password menggunakan token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password berhasil direset
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'password berhasil direset'

  # ============================================================
  # PROFILE
  # ============================================================
  /profile:
    get:
      tags:
        - Profile
      summary: Ambil data profil pengguna
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil profil
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil profil'
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile/reminder-settings:
    patch:
      tags:
        - Profile
      summary: Update pengaturan pengingat (reminder)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReminderSettingsRequest'
      responses:
        '200':
          description: Settings berhasil diupdate
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Reminder settings berhasil diupdate'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /profile/delete-user:
    post:
      tags:
        - Profile
      summary: Hapus akun pengguna secara permanen
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'User deleted successfully'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # CONSUMPTION LOGS
  # ============================================================
  /consumption-logs:
    get:
      tags:
        - Consumption
      summary: Ambil semua riwayat konsumsi
      security:
        - bearerAuth: []
      parameters:
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/ConsumptionCategory'
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [consumedAt, amount, createdAt]
            default: consumedAt
        - name: order
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Berhasil mengambil data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil log konsumsi'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConsumptionLog'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Consumption
      summary: Tambah item konsumsi baru
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddConsumptionRequest'
      responses:
        '201':
          description: Berhasil ditambahkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Log konsumsi berhasil dicatat'
                  data:
                    $ref: '#/components/schemas/ConsumptionLog'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /consumption-logs/{id}:
    put:
      tags:
        - Consumption
      summary: Update item konsumsi
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConsumptionRequest'
      responses:
        '200':
          description: Berhasil diupdate
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Log konsumsi berhasil diperbarui'
                  data:
                    $ref: '#/components/schemas/ConsumptionLog'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Data tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Consumption
      summary: Hapus item konsumsi
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Log konsumsi berhasil dihapus'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Data tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # DASHBOARD INSIGHT
  # ============================================================
  /dashboard/insight:
    get:
      tags:
        - Consumption
      summary: Ambil ringkasan insight konsumsi
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'data berhasil diambil'
                  data:
                    $ref: '#/components/schemas/ConsumptionInsights'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # WISHLIST
  # ============================================================
  /wishlist:
    get:
      tags:
        - Wishlist
      summary: Ambil semua item wishlist
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'wishlist get!'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/WishlistItem'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Wishlist
      summary: Tambah item ke wishlist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddWishlistRequest'
      responses:
        '201':
          description: Berhasil ditambahkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'wishlist created!'
                  data:
                    $ref: '#/components/schemas/WishlistItem'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /wishlist/{id}:
    patch:
      tags:
        - Wishlist
      summary: Update status wishlist (beli/batalkan)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWishlistStatusRequest'
      responses:
        '200':
          description: Berhasil diupdate
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'wishlist updated'
                  data:
                    $ref: '#/components/schemas/WishlistItem'
        '400':
          description: Validasi gagal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Data tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # CHALLENGE
  # ============================================================
  /challenges:
    get:
      tags:
        - Challenge
      summary: Ambil semua challenge aktif
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil daftar challenge aktif
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil daftar challenge aktif'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Challenge'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /challenges/me:
    get:
      tags:
        - Challenge
      summary: Ambil challenge yang diikuti
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil daftar challenge yang diikuti
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil daftar challenge yang diikuti'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserChallenge'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /challenges/landing-page-challenge:
    get:
      tags:
        - Challenge
      summary: Ambil 5 challenge terpopuler untuk landing page
      responses:
        '200':
          description: Berhasil mengambil 5 challenge terpopuler
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil 5 challenge terpopuler'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Challenge'

  /challenges/{id}:
    get:
      tags:
        - Challenge
      summary: Ambil detail challenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Berhasil mengambil detail challenge
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil detail challenge'
                  data:
                    $ref: '#/components/schemas/Challenge'
        '404':
          description: Challenge tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /challenges/{id}/join:
    post:
      tags:
        - Challenge
      summary: Ikut challenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Berhasil bergabung dalam challenge
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil bergabung dalam challenge'
                  data:
                    $ref: '#/components/schemas/UserChallenge'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Challenge tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /challenges/{id}/participants:
    get:
      tags:
        - Challenge
      summary: Ambil daftar peserta challenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Berhasil mengambil daftar peserta
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil daftar peserta'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChallengeParticipant'

  # ============================================================
  # UPLOAD
  # ============================================================
  /upload/signature:
    post:
      tags:
        - Upload
      summary: Dapatkan signature untuk upload Cloudinary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadSignatureRequest'
      responses:
        '200':
          description: Signature berhasil didapatkan
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      signature:
                        type: string
                      timestamp:
                        type: integer
                      apiKey:
                        type: string
                      cloudName:
                        type: string
                      folder:
                        type: string

  # ============================================================
  # HELPER (Dev/Internal)
  # ============================================================
  /helper/admin/create:
    post:
      tags:
        - Helper
      summary: Buat akun admin baru (menggunakan special code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterAdminRequest'
      responses:
        '201':
          description: Admin berhasil dibuat
        '403':
          description: Special code salah

  /helper/users/create:
    post:
      tags:
        - Helper
      summary: Buat user baru (helper)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User berhasil dibuat

  /helper/users/get/all:
    get:
      tags:
        - Helper
      summary: Ambil semua user (helper)
      responses:
        '200':
          description: Daftar user berhasil diambil

  /helper/users/get/{id}:
    get:
      tags:
        - Helper
      summary: Ambil user berdasarkan ID (helper)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User berhasil diambil

  /helper/users/update/{id}:
    put:
      tags:
        - Helper
      summary: Update user berdasarkan ID (helper)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User berhasil diperbarui

  # ============================================================
  # ADMIN
  # ============================================================
  /admin/stats:
    get:
      tags:
        - Admin
      summary: Statistik overview admin
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil data overview
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'Berhasil mengambil data overview'
                  data:
                    $ref: '#/components/schemas/AdminOverview'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin only

  /admin/users:
    get:
      tags:
        - Admin
      summary: Daftar pengguna (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: Berhasil mengambil daftar pengguna
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUserListResponse'

  /admin/users/{id}:
    delete:
      tags:
        - Admin
      summary: Hapus akun pengguna (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User berhasil dihapus
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: 'User berhasil dihapus'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - Admin only
        '404':
          description: User tidak ditemukan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/users/export:
    get:
      tags:
        - Admin
      summary: Export data pengguna ke CSV
      security:
        - bearerAuth: []
      responses:
        '200':
          description: File CSV berhasil didownload
          content:
            text/csv:
              schema:
                type: string
                format: binary

  /admin/monitoring:
    get:
      tags:
        - Admin
      summary: Monitoring aktivitas pengguna
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Data monitoring berhasil diambil
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMonitoringResponse'

  /admin/challenges:
    get:
      tags:
        - Admin
      summary: Semua challenge (admin)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Berhasil mengambil semua daftar challenge
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Challenge'
    post:
      tags:
        - Admin
      summary: Buat challenge baru
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChallengeRequest'
      responses:
        '201':
          description: Berhasil membuat challenge baru
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Challenge'

  /admin/challenges/{id}:
    put:
      tags:
        - Admin
      summary: Update challenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChallengeRequest'
      responses:
        '200':
          description: Berhasil memperbarui data challenge
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Challenge'
    delete:
      tags:
        - Admin
      summary: Hapus challenge
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Berhasil menghapus challenge
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Challenge'

################################################################################
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # --- AUTH ---
    RegisterRequest:
      type: object
      required: [nickname, fullname, email, password, passwordConfirmation]
      properties:
        nickname:
          type: string
          minLength: 3
          pattern: '^[a-zA-Z0-9_]+$'
          example: 'ikmal'
        fullname:
          type: string
          example: 'Ikmal'
        email:
          type: string
          format: email
          example: 'ikmal@email.com'
        password:
          type: string
          minLength: 8
          example: 'password123'
        passwordConfirmation:
          type: string
          minLength: 8
          example: 'password123'

    LoginRequest:
      type: object
      required: [password]
      properties:
        nickname:
          type: string
          example: 'ikmal'
        email:
          type: string
          format: email
          example: 'ikmal@email.com'
        password:
          type: string
          example: 'password123'

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          example: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: 'ikmal@email.com'

    ResetPasswordRequest:
      type: object
      required: [password, passwordConfirmation, token]
      properties:
        password:
          type: string
          minLength: 8
        passwordConfirmation:
          type: string
          minLength: 8
        token:
          type: string

    # --- USER / PROFILE ---
    User:
      type: object
      properties:
        fullName:
          type: string
          example: 'Ikmal'
        nickName:
          type: string
          example: 'ikmal123'
        email:
          type: string
          example: 'ikmal@email.com'
        reminderEnabled:
          type: boolean
          example: true
        reminderTime:
          type: string
          example: "19:00"
          pattern: '^([0-1]\d|2[0-3]):[0-5]\d$'

    ReminderSettingsRequest:
      type: object
      required: [opt_in]
      properties:
        opt_in:
          type: boolean
        reminder_time:
          type: string
          example: "19:00"
          pattern: '^([0-1]\d|2[0-3]):[0-5]\d$'

    # --- CONSUMPTION ---
    ConsumptionCategory:
      type: string
      enum: ['makanan & minuman', 'fashion', 'elektronik', 'perawatan diri', 'hiburan', 'lainnya']

    ConsumptionLog:
      type: object
      properties:
        id:
          type: string
          format: uuid
        itemName:
          type: string
          example: 'Nasi Goreng'
        itemCategory:
          $ref: '#/components/schemas/ConsumptionCategory'
        itemCategoryCustom:
          type: string
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
        amount:
          type: number
          example: 25000
        notes:
          type: string
          nullable: true
        consumedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    AddConsumptionRequest:
      type: object
      required: [itemName, itemCategory, amount]
      properties:
        itemName:
          type: string
          example: 'Nasi Goreng'
        itemCategory:
          $ref: '#/components/schemas/ConsumptionCategory'
        itemCategoryCustom:
          type: string
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
        amount:
          type: number
          example: 25000
        notes:
          type: string
        consumedAt:
          type: string
          format: date-time

    UpdateConsumptionRequest:
      type: object
      properties:
        itemName:
          type: string
        itemCategory:
          $ref: '#/components/schemas/ConsumptionCategory'
        itemCategoryCustom:
          type: string
          nullable: true
        imageUrl:
          type: string
          format: uri
          nullable: true
        amount:
          type: number
        notes:
          type: string
        consumedAt:
          type: string
          format: date-time

    ConsumptionInsights:
      type: object
      properties:
        streak:
          type: integer
          example: 5
        weekly_summary:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              total:
                type: number
        monthly_summary:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              total:
                type: number
        wishlist_count:
          type: integer
          example: 3
        active_challenge:
          type: integer
          example: 2

    # --- WISHLIST ---
    WishlistItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        itemName:
          type: string
          example: 'Sepatu Nike'
        itemCategory:
          $ref: '#/components/schemas/ConsumptionCategory'
        itemCategoryCustom:
          type: string
          nullable: true
        estimatePrice:
          type: number
          example: 1500000
        waitingDays:
          type: integer
          enum: [3, 7, 14, 30]
        whislistStatus:
          type: string
          enum: [waiting, bought, cancelled]
        wishlistDaysRemaining:
          type: integer
        reason:
          type: string
          nullable: true

    AddWishlistRequest:
      type: object
      required: [itemName, itemCategory, estimatePrice, waitingDays]
      properties:
        itemName:
          type: string
          example: 'Sepatu Nike'
        itemCategory:
          $ref: '#/components/schemas/ConsumptionCategory'
        itemCategoryCustom:
          type: string
          nullable: true
        estimatePrice:
          type: number
          example: 1500000
        waitingDays:
          type: integer
          enum: [3, 7, 14, 30]
        reason:
          type: string

    UpdateWishlistStatusRequest:
      type: object
      required: [whislistStatus]
      properties:
        whislistStatus:
          type: string
          enum: [waiting, bought, cancelled]

    # --- CHALLENGE ---
    ChallengeCategory:
      type: string
      enum: ['Zero Waste', 'No Impulse Buy', 'Eco Eating', 'SecondHand', 'LowSpend']

    ChallengeStatus:
      type: string
      enum: [active, inactive]

    Challenge:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        fullDescription:
          type: string
        rules:
          type: string
          nullable: true
        howTo:
          type: string
          nullable: true
        challengesCategory:
          $ref: '#/components/schemas/ChallengeCategory'
        imageUrl:
          type: string
          format: uri
          nullable: true
        sourceUrl:
          type: string
          format: uri
          nullable: true
        durationDays:
          type: integer
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
        endDate:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: '#/components/schemas/ChallengeStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        participantCount:
          type: integer
        label:
          type: string
          example: 'Sedang Berlangsung'
          enum: ['Sedang Berlangsung', 'Akan Datang']

    CreateChallengeRequest:
      type: object
      required: [title, description, fullDescription, challengesCategory]
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
        fullDescription:
          type: string
        rules:
          type: string
          nullable: true
        howTo:
          type: string
          nullable: true
        challengesCategory:
          $ref: '#/components/schemas/ChallengeCategory'
        imageUrl:
          type: string
          format: uri
          nullable: true
        sourceUrl:
          type: string
          format: uri
          nullable: true
        durationDays:
          type: integer
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
        endDate:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: '#/components/schemas/ChallengeStatus'

    UpdateChallengeRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        description:
          type: string
        fullDescription:
          type: string
        rules:
          type: string
          nullable: true
        howTo:
          type: string
          nullable: true
        challengesCategory:
          $ref: '#/components/schemas/ChallengeCategory'
        imageUrl:
          type: string
          format: uri
          nullable: true
        sourceUrl:
          type: string
          format: uri
          nullable: true
        durationDays:
          type: integer
          nullable: true
        startDate:
          type: string
          format: date-time
          nullable: true
        endDate:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: '#/components/schemas/ChallengeStatus'

    UserChallenge:
      type: object
      properties:
        challengeId:
          type: string
          format: uuid
        title:
          type: string
        joinedAt:
          type: string
          format: date-time
        progress:
          type: integer

    ChallengeParticipant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nickName:
          type: string
        fullName:
          type: string
        joinedAt:
          type: string
          format: date-time

    # --- ADMIN ---
    AdminOverview:
      type: object
      properties:
        totalUsers:
          type: integer
        totalConsumptionLogs:
          type: integer
        totalCancelledImpulse:
          type: integer
        totalActiveChallenges:
          type: integer

    AdminUserListResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/User'
            meta:
              type: object
              properties:
                page:
                  type: integer
                limit:
                  type: integer
                total:
                  type: integer
                totalPages:
                  type: integer
                next:
                  type: integer
                  nullable: true
                prev:
                  type: integer
                  nullable: true

    AdminMonitoringResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            dailyActiveUsers:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                  totalActiveUsers:
                    type: integer
            dailyLogs:
              type: array
              items:
                type: object
                properties:
                  date:
                    type: string
                  totalItems:
                    type: integer
            topChallenges:
              type: array
              items:
                type: object
                properties:
                  challengeTitle:
                    type: string
                  totalParticipants:
                    type: integer

    # --- UPLOAD ---
    UploadSignatureRequest:
      type: object
      required: [folderType]
      properties:
        folderType:
          type: string
          enum: [consumption, challenge]

    # --- HELPER ---
    RegisterAdminRequest:
      type: object
      required: [nickname, fullname, email, password, passwordConfirmation, specialCode]
      properties:
        nickname:
          type: string
        fullname:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        passwordConfirmation:
          type: string
        specialCode:
          type: integer

    CreateUserRequest:
      type: object
      required: [fullName, nickName, email, password]
      properties:
        fullName:
          type: string
        nickName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        reminderTime:
          type: string
          pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
          example: '19:00'
        reminderEnabled:
          type: boolean

    UpdateUserRequest:
      type: object
      properties:
        fullName:
          type: string
        nickName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
        reminderTime:
          type: string
          pattern: '^([0-1]?[0-9]|2[0-3]):[0-5][0-9]$'
          example: '19:00'
        reminderEnabled:
          type: boolean
        isActive:
          type: boolean

    # --- COMMON ---
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: 'Pesan error di sini'

    ValidationError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: 'Validasi gagal'
        errors:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
                example: 'email'
              message:
                type: string
                example: 'Format email tidak valid'
